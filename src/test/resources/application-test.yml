spring:
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 5s
      timeout: 5s

  cloud:
    aws:
      credentials:
        access-key: dummy
        secret-key: dummy
        instance-profile: false
      region:
        static: ap-northeast-2
      stack:
        auto: false
      sqs:
        queue:
          email-alert: dummy
          coupon-alert: dummy
      s3:
        bucket: couponmoa-user-profile

